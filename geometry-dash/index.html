<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Dash - Gullsher Games</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: #0077ff; border: 4px solid #fff; border-radius: 10px; box-shadow: 0 0 30px rgba(0,119,255,0.5); max-width: 95vw; max-height: 85vh; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; }
        #branding { position: absolute; bottom: 15px; right: 15px; font-size: 12px; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; pointer-events: none; }
        #hint { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #fff; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="ui">Attempt: <span id="attempts">1</span> | Progress: <span id="progress">0</span>%</div>
    <canvas id="gameCanvas"></canvas>
    <div id="hint">Click or Press SPACE to Jump!</div>
    <div id="branding">🎮 Provided by Gullsher Games</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const attemptsElement = document.getElementById("attempts");
        const progressElement = document.getElementById("progress");

        canvas.width = 800;
        canvas.height = 400;

        let attempts = 1;
        let gameActive = true;
        let speed = 5;
        let gravity = 0.6;
        let jumpForce = -10;

        const player = { x: 100, y: 300, size: 30, vy: 0, grounded: false, angle: 0 };
        let obstacles = [];
        let frameCount = 0;

        function spawnObstacle() {
            if (!gameActive) return;
            const type = Math.random() > 0.3 ? 'spike' : 'block';
            obstacles.push({ x: canvas.width + 100, y: 330, type, w: 30, h: 30 });
        }

        function update() {
            if (!gameActive) return;

            frameCount++;
            if (frameCount % 100 === 0) spawnObstacle();

            // Player Physics
            player.vy += gravity;
            player.y += player.vy;

            if (player.y > 300) {
                player.y = 300;
                player.vy = 0;
                player.grounded = true;
                // Snap angle to 90 degrees when grounded
                player.angle = Math.round(player.angle / (Math.PI/2)) * (Math.PI/2);
            } else {
                player.grounded = false;
                player.angle += 0.15; // Rotate in air
            }

            // Update Obstacles
            obstacles.forEach((obs, index) => {
                obs.x -= speed;
                if (obs.x < -100) obstacles.splice(index, 1);

                // Collision Check
                if (player.x < obs.x + obs.w && player.x + player.size > obs.x &&
                    player.y < obs.y + obs.h && player.y + player.size > obs.y) {
                    resetGame();
                }
            });

            progressElement.innerText = Math.min(100, Math.floor(frameCount / 20));
        }

        function draw() {
            // Background
            ctx.fillStyle = "#0077ff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.fillStyle = "#0055bb";
            ctx.fillRect(0, 330, canvas.width, 70);
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, 330); ctx.lineTo(canvas.width, 330); ctx.stroke();

            // Obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = "#fff";
                if (obs.type === 'spike') {
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y + obs.h);
                    ctx.lineTo(obs.x + obs.w / 2, obs.y);
                    ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
                    ctx.fill();
                } else {
                    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
                }
            });

            // Player
            ctx.save();
            ctx.translate(player.x + player.size/2, player.y + player.size/2);
            ctx.rotate(player.angle);
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
            // Face
            ctx.fillStyle = "#000";
            ctx.fillRect(5, -10, 5, 5);
            ctx.fillRect(5, 5, 5, 5);
            ctx.restore();
        }

        function jump() {
            if (player.grounded && gameActive) {
                player.vy = jumpForce;
                player.grounded = false;
            }
        }

        window.addEventListener("keydown", e => { if (e.code === "Space" || e.code === "ArrowUp") jump(); });
        canvas.addEventListener("mousedown", jump);

        function resetGame() {
            attempts++;
            attemptsElement.innerText = attempts;
            frameCount = 0;
            obstacles = [];
            player.y = 300;
            player.vy = 0;
            player.angle = 0;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
