<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast - Gullsher Games</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #game-container { background: #1e1e1e; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; position: relative; max-width: 95vw; }
        canvas { background: #252525; border: 2px solid #333; border-radius: 10px; cursor: pointer; touch-action: none; }
        #score-container { font-size: 28px; font-weight: bold; margin-bottom: 15px; color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.3); }
        #branding { position: absolute; bottom: -35px; right: 10px; font-size: 12px; color: #666; font-weight: bold; }
        .controls-hint { font-size: 14px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-container">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls-hint">Drag blocks to clear rows and columns!</div>
        <div id="branding">🎮 Provided by Gullsher Games</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const GRID_SIZE = 8;
        const CELL_SIZE = 40;
        const PADDING = 10;
        canvas.width = GRID_SIZE * CELL_SIZE + PADDING * 2;
        canvas.height = canvas.width + 140; // Extra space for pieces

        let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let score = 0;
        let pieces = [];
        let draggingPiece = null;
        let dragX = 0, dragY = 0;

        const COLORS = ["#FF3D00", "#FFEA00", "#00E676", "#00B0FF", "#D500F9", "#FF9100", "#1DE9B6"];
        const SHAPES = [
            [[1]], // 1x1
            [[1, 1]], // 1x2
            [[1], [1]], // 2x1
            [[1, 1, 1]], // 1x3
            [[1], [1], [1]], // 3x1
            [[1, 1], [1, 1]], // 2x2
            [[1, 1, 1], [0, 1, 0]], // T
            [[1, 1], [1, 0]], // L small
            [[1, 1, 1], [1, 0, 0], [1, 0, 0]] // L big
        ];

        function generatePieces() {
            pieces = [];
            for (let i = 0; i < 3; i++) {
                const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                const color = COLORS[Math.floor(Math.random() * COLORS.length)];
                const x = 30 + i * 110;
                const y = canvas.width + 20;
                pieces.push({ shape, color, x, y, originalX: x, originalY: y });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Grid
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    ctx.fillStyle = grid[r][c] || "#333";
                    ctx.fillRect(PADDING + c * CELL_SIZE, PADDING + r * CELL_SIZE, CELL_SIZE - 2, CELL_SIZE - 2);
                }
            }

            // Draw Pieces
            pieces.forEach(p => {
                if (p === draggingPiece) return;
                drawPiece(p, p.x, p.y, 0.6);
            });

            if (draggingPiece) {
                drawPiece(draggingPiece, dragX, dragY, 1);
            }
        }

        function drawPiece(p, x, y, scale) {
            ctx.fillStyle = p.color;
            const size = CELL_SIZE * scale;
            p.shape.forEach((row, r) => {
                row.forEach((val, c) => {
                    if (val) {
                        ctx.fillRect(x + c * size, y + r * size, size - 2, size - 2);
                    }
                });
            });
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener("mousedown", startDrag);
        canvas.addEventListener("touchstart", startDrag);
        window.addEventListener("mousemove", drag);
        window.addEventListener("touchmove", drag);
        window.addEventListener("mouseup", endDrag);
        window.addEventListener("touchend", endDrag);

        function startDrag(e) {
            const pos = getMousePos(e);
            pieces.forEach(p => {
                if (pos.x > p.x && pos.x < p.x + 80 && pos.y > p.y && pos.y < p.y + 80) {
                    draggingPiece = p;
                    dragX = pos.x - 20;
                    dragY = pos.y - 20;
                }
            });
        }

        function drag(e) {
            if (!draggingPiece) return;
            const pos = getMousePos(e);
            dragX = pos.x - 40;
            dragY = pos.y - 40;
            draw();
            e.preventDefault();
        }

        function endDrag() {
            if (!draggingPiece) return;
            const gridX = Math.round((dragX - PADDING) / CELL_SIZE);
            const gridY = Math.round((dragY - PADDING) / CELL_SIZE);

            if (canPlace(draggingPiece, gridX, gridY)) {
                placePiece(draggingPiece, gridX, gridY);
                pieces = pieces.filter(p => p !== draggingPiece);
                if (pieces.length === 0) generatePieces();
                checkLines();
            } else {
                draggingPiece.x = draggingPiece.originalX;
                draggingPiece.y = draggingPiece.originalY;
            }
            draggingPiece = null;
            draw();
        }

        function canPlace(p, startX, startY) {
            return p.shape.every((row, r) => 
                row.every((val, c) => {
                    if (!val) return true;
                    const x = startX + c;
                    const y = startY + r;
                    return x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE && !grid[y][x];
                })
            );
        }

        function placePiece(p, startX, startY) {
            p.shape.forEach((row, r) => {
                row.forEach((val, c) => {
                    if (val) grid[startY + r][startX + c] = p.color;
                });
            });
            score += 10;
            scoreElement.innerText = score;
        }

        function checkLines() {
            let linesToClear = { rows: [], cols: [] };
            for (let i = 0; i < GRID_SIZE; i++) {
                if (grid[i].every(cell => cell !== 0)) linesToClear.rows.push(i);
                if (grid.every(row => row[i] !== 0)) linesToClear.cols.push(i);
            }
            linesToClear.rows.forEach(r => grid[r].fill(0));
            linesToClear.cols.forEach(c => grid.forEach(row => row[c] = 0));
            if (linesToClear.rows.length || linesToClear.cols.length) {
                score += (linesToClear.rows.length + linesToClear.cols.length) * 100;
                scoreElement.innerText = score;
            }
        }

        generatePieces();
        draw();
    </script>
</body>
</html>
