<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bloxd.io 2D - Gullsher Games</title>
    <style>
        body { margin: 0; background: #a2d2ff; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: #a2d2ff; border: 4px solid #333; border-radius: 10px; max-width: 95vw; max-height: 85vh; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        #branding { position: absolute; bottom: 15px; right: 15px; font-size: 12px; color: #fff; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; left: 20px; font-size: 12px; color: #eee; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">Blocks: <span id="inv">10</span> | Height: <span id="height">0</span>m</div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">WASD/Arrows: Move | Click: Place Block | R: Reset</div>
    <div id="branding">🎮 Provided by Gullsher Games</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const invElement = document.getElementById("inv");
        const heightElement = document.getElementById("height");

        canvas.width = 800;
        canvas.height = 500;

        const tileSize = 40;
        let inventory = 10;
        let maxHeight = 0;

        const player = { x: 100, y: 400, w: 25, h: 35, vx: 0, vy: 0, speed: 5, jump: -10, grounded: false };
        let blocks = [];

        // Initial Ground
        for(let i=0; i<canvas.width/tileSize; i++) {
            blocks.push({x: i*tileSize, y: 460, type: 'grass'});
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Sky Gradient
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, "#87CEEB");
            grad.addColorStop(1, "#a2d2ff");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Blocks
            blocks.forEach(b => {
                ctx.fillStyle = b.type === 'grass' ? "#4CAF50" : "#95a5a6";
                ctx.fillRect(b.x, b.y, tileSize, tileSize);
                ctx.strokeStyle = "rgba(0,0,0,0.1)";
                ctx.strokeRect(b.x, b.y, tileSize, tileSize);
            });

            // Draw Player
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.strokeStyle = "#c0392b";
            ctx.strokeRect(player.x, player.y, player.w, player.h);
        }

        function update() {
            player.vy += 0.5; // Gravity
            player.x += player.vx;
            player.y += player.vy;

            player.grounded = false;
            blocks.forEach(b => {
                // Simple AABB Collision
                if (player.x < b.x + tileSize && player.x + player.w > b.x &&
                    player.y + player.h > b.y && player.y + player.h < b.y + 20 && player.vy >= 0) {
                    player.y = b.y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                }
            });

            // Screen bounds
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
            if (player.y > canvas.height) { player.x = 100; player.y = 300; player.vy = 0; }

            // Update Height UI
            let currentHeight = Math.max(0, Math.floor((460 - player.y) / 10));
            if (currentHeight > maxHeight) maxHeight = currentHeight;
            heightElement.innerText = maxHeight;
        }

        const keys = {};
        window.addEventListener("keydown", e => {
            keys[e.code] = true;
            if ((e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") && player.grounded) player.vy = player.jump;
            if (e.code === "KeyR") { blocks = blocks.slice(0, 20); inventory = 10; maxHeight = 0; }
        });
        window.addEventListener("keyup", e => keys[e.code] = false);

        canvas.addEventListener("mousedown", e => {
            if (inventory <= 0) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const bx = Math.floor(mouseX / tileSize) * tileSize;
            const by = Math.floor(mouseY / tileSize) * tileSize;

            // Check if block already exists
            if (!blocks.some(b => b.x === bx && b.y === by)) {
                blocks.push({x: bx, y: by, type: 'stone'});
                inventory--;
                invElement.innerText = inventory;
            }
        });

        function gameLoop() {
            player.vx = 0;
            if (keys["ArrowLeft"] || keys["KeyA"]) player.vx = -player.speed;
            if (keys["ArrowRight"] || keys["KeyD"]) player.vx = player.speed;

            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
