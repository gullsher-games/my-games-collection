<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smash Karts - Gullsher Games</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: #333; border: 4px solid #555; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); max-width: 95vw; max-height: 85vh; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: #ffeb3b; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #branding { position: absolute; bottom: 15px; right: 15px; font-size: 12px; color: rgba(255,255,255,0.5); pointer-events: none; }
        #controls { position: absolute; bottom: 20px; left: 20px; font-size: 12px; color: #ccc; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">Kills: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">Arrows/WASD: Drive | Space: Boost</div>
    <div id="branding">🎮 Provided by Gullsher Games</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        canvas.width = 600;
        canvas.height = 400;

        let score = 0;
        const kart = {
            x: 300, y: 200, angle: 0, speed: 0, maxSpeed: 5, 
            accel: 0.2, friction: 0.95, turnSpeed: 0.07, color: "#f44336"
        };

        const enemies = [];
        for(let i=0; i<3; i++) {
            enemies.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                angle: Math.random()*Math.PI*2, speed: 2, color: "#2196f3"
            });
        }

        const keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function update() {
            // Kart Movement
            if (keys["ArrowUp"] || keys["KeyW"]) kart.speed += kart.accel;
            if (keys["ArrowDown"] || keys["KeyS"]) kart.speed -= kart.accel;
            if (keys["ArrowLeft"] || keys["KeyA"]) kart.angle -= kart.turnSpeed;
            if (keys["ArrowRight"] || keys["KeyD"]) kart.angle += kart.turnSpeed;

            kart.speed *= kart.friction;
            if (kart.speed > kart.maxSpeed) kart.speed = kart.maxSpeed;
            
            kart.x += Math.cos(kart.angle) * kart.speed;
            kart.y += Math.sin(kart.angle) * kart.speed;

            // Screen Wrap
            if (kart.x < 0) kart.x = canvas.width;
            if (kart.x > canvas.width) kart.x = 0;
            if (kart.y < 0) kart.y = canvas.height;
            if (kart.y > canvas.height) kart.y = 0;

            // Update Enemies
            enemies.forEach(enemy => {
                enemy.x += Math.cos(enemy.angle) * enemy.speed;
                enemy.y += Math.sin(enemy.angle) * enemy.speed;
                if (Math.random() < 0.02) enemy.angle += (Math.random()-0.5);
                
                if (enemy.x < 0) enemy.x = canvas.width;
                if (enemy.x > canvas.width) enemy.x = 0;
                if (enemy.y < 0) enemy.y = canvas.height;
                if (enemy.y > canvas.height) enemy.y = 0;

                // Collision Check
                const dist = Math.hypot(kart.x - enemy.x, kart.y - enemy.y);
                if (dist < 25 && Math.abs(kart.speed) > 2) {
                    score++;
                    scoreElement.innerText = score;
                    enemy.x = Math.random()*canvas.width;
                    enemy.y = Math.random()*canvas.height;
                }
            });
        }

        function draw() {
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Track Lines
            ctx.strokeStyle = "#444";
            ctx.lineWidth = 2;
            for(let i=0; i<canvas.width; i+=50) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
            }

            // Draw Enemies
            enemies.forEach(enemy => drawKart(enemy.x, enemy.y, enemy.angle, enemy.color));

            // Draw Player Kart
            drawKart(kart.x, kart.y, kart.angle, kart.color);
        }

        function drawKart(x, y, angle, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            // Body
            ctx.fillStyle = color;
            ctx.fillRect(-15, -10, 30, 20);
            // Wheels
            ctx.fillStyle = "#000";
            ctx.fillRect(-12, -12, 8, 4);
            ctx.fillRect(4, -12, 8, 4);
            ctx.fillRect(-12, 8, 8, 4);
            ctx.fillRect(4, 8, 8, 4);
            // Front
            ctx.fillStyle = "#fff";
            ctx.fillRect(10, -5, 5, 10);
            
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
