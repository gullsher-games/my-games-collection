<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft 2D - Gullsher Games</title>
    <style>
        body { margin: 0; background: #87CEEB; color: white; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: #87CEEB; border: 4px solid #333; image-rendering: pixelated; max-width: 95vw; max-height: 85vh; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none; }
        #branding { position: absolute; bottom: 15px; right: 15px; font-size: 12px; color: #fff; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; left: 20px; font-size: 12px; color: #eee; background: rgba(0,0,0,0.3); padding: 5px; }
    </style>
</head>
<body>
    <div id="ui">Inventory: <span id="inv">0</span> Blocks</div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">WASD/Arrows: Move | Click: Mine/Build</div>
    <div id="branding">🎮 Provided by Gullsher Games</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const invElement = document.getElementById("inv");

        canvas.width = 800;
        canvas.height = 400;

        const tileSize = 40;
        const rows = canvas.height / tileSize;
        const cols = canvas.width / tileSize;

        let world = [];
        let inventory = 0;

        // Generate World
        for (let r = 0; r < rows; r++) {
            world[r] = [];
            for (let c = 0; c < cols; c++) {
                if (r > 6) world[r][c] = 1; // Dirt
                else if (r === 6) world[r][c] = 2; // Grass
                else world[r][c] = 0; // Air
            }
        }

        const player = { x: 400, y: 100, w: 30, h: 38, vx: 0, vy: 0, speed: 4, jump: -8, grounded: false };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw World
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (world[r][c] === 1) {
                        ctx.fillStyle = "#8B4513"; // Dirt
                        ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                        ctx.strokeStyle = "#5D2E0C";
                        ctx.strokeRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    } else if (world[r][c] === 2) {
                        ctx.fillStyle = "#228B22"; // Grass
                        ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                        ctx.strokeStyle = "#1a6b1a";
                        ctx.strokeRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    }
                }
            }

            // Draw Player
            ctx.fillStyle = "#3498db";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.strokeStyle = "#2980b9";
            ctx.strokeRect(player.x, player.y, player.w, player.h);
        }

        function update() {
            player.vy += 0.4; // Gravity
            player.x += player.vx;
            player.y += player.vy;

            // Collision with ground
            player.grounded = false;
            let r = Math.floor((player.y + player.h) / tileSize);
            let c = Math.floor((player.x + player.w/2) / tileSize);
            
            if (r >= 0 && r < rows && c >= 0 && c < cols && world[r][c] > 0) {
                player.y = r * tileSize - player.h;
                player.vy = 0;
                player.grounded = true;
            }

            // Screen bounds
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
        }

        // Controls
        const keys = {};
        window.addEventListener("keydown", e => {
            keys[e.code] = true;
            if ((e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") && player.grounded) player.vy = player.jump;
        });
        window.addEventListener("keyup", e => keys[e.code] = false);

        canvas.addEventListener("mousedown", e => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const c = Math.floor(mouseX / tileSize);
            const r = Math.floor(mouseY / tileSize);

            if (r >= 0 && r < rows && c >= 0 && c < cols) {
                if (world[r][c] > 0) {
                    world[r][c] = 0; // Mine
                    inventory++;
                } else if (inventory > 0) {
                    world[r][c] = 1; // Build
                    inventory--;
                }
                invElement.innerText = inventory;
            }
        });

        function gameLoop() {
            player.vx = 0;
            if (keys["ArrowLeft"] || keys["KeyA"]) player.vx = -player.speed;
            if (keys["ArrowRight"] || keys["KeyD"]) player.vx = player.speed;

            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
