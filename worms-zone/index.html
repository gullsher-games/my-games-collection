<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worms Zone - Gullsher Games</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: #000; border: 5px solid #333; border-radius: 15px; box-shadow: 0 0 30px rgba(0,255,0,0.1); max-width: 95vw; max-height: 80vh; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 20px; font-weight: bold; color: #4CAF50; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #branding { position: absolute; bottom: 15px; right: 15px; font-size: 12px; color: rgba(255,255,255,0.4); pointer-events: none; }
        #controls-hint { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls-hint">Use Arrows or Swipe to Move</div>
    <div id="branding">🎮 Provided by Gullsher Games</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Set canvas size
        canvas.width = 600;
        canvas.height = 400;

        const gridSize = 20;
        let snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1;
        let dy = 0;
        let nextDx = 1;
        let nextDy = 0;
        let score = 0;
        let gameSpeed = 100;
        let lastTime = 0;

        function draw() {
            // Clear canvas
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (optional for style)
            ctx.strokeStyle = "#111";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }

            // Draw Food
            ctx.fillStyle = "#FF5252";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#FF5252";
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw Snake
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#4CAF50" : "#81C784";
                ctx.strokeStyle = "#1b5e20";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 1, gridSize - 1);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize - 1, gridSize - 1);
            });
        }

        function move() {
            dx = nextDx;
            dy = nextDy;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Wall collision (Wrap around like Worms Zone)
            if (head.x < 0) head.x = canvas.width / gridSize - 1;
            if (head.x >= canvas.width / gridSize) head.x = 0;
            if (head.y < 0) head.y = canvas.height / gridSize - 1;
            if (head.y >= canvas.height / gridSize) head.y = 0;

            // Self collision
            if (snake.some(part => part.x === head.x && part.y === head.y)) {
                alert("Game Over! Your Score: " + score);
                resetGame();
                return;
            }

            snake.unshift(head);

            // Check food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                placeFood();
                if (gameSpeed > 50) gameSpeed -= 1; // Get faster
            } else {
                snake.pop();
            }
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize));
            food.y = Math.floor(Math.random() * (canvas.height / gridSize));
            // Don't place food on snake
            if (snake.some(part => part.x === food.x && part.y === food.y)) placeFood();
        }

        function resetGame() {
            snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
            dx = 1; dy = 0; nextDx = 1; nextDy = 0;
            score = 0;
            scoreElement.innerText = score;
            gameSpeed = 100;
            placeFood();
        }

        function handleInput(key) {
            if (key === "ArrowUp" && dy === 0) { nextDx = 0; nextDy = -1; }
            if (key === "ArrowDown" && dy === 0) { nextDx = 0; nextDy = 1; }
            if (key === "ArrowLeft" && dx === 0) { nextDx = -1; nextDy = 0; }
            if (key === "ArrowRight" && dx === 0) { nextDx = 1; nextDy = 0; }
        }

        window.addEventListener("keydown", e => handleInput(e.key));

        // Touch Controls
        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener("touchstart", e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener("touchmove", e => {
            if (!touchStartX || !touchStartY) return;
            let diffX = touchStartX - e.touches[0].clientX;
            let diffY = touchStartY - e.touches[0].clientY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) handleInput("ArrowLeft"); else handleInput("ArrowRight");
            } else {
                if (diffY > 0) handleInput("ArrowUp"); else handleInput("ArrowDown");
            }
            touchStartX = 0; touchStartY = 0;
            e.preventDefault();
        }, {passive: false});

        function gameLoop(currentTime) {
            if (currentTime - lastTime > gameSpeed) {
                move();
                draw();
                lastTime = currentTime;
            }
            requestAnimationFrame(gameLoop);
        }

        placeFood();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
