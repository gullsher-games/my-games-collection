<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto X3M Alternative - Gullsher Games</title>
    <style>
        body { margin: 0; background: #333; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); border: 4px solid #222; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); max-width: 95vw; max-height: 85vh; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: #ffeb3b; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #branding { position: absolute; bottom: 15px; right: 15px; font-size: 12px; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; left: 20px; font-size: 14px; color: #eee; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">Distance: <span id="score">0</span>m</div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">W/Up: Accelerate | S/Down: Brake | A/D: Lean | R: Reset</div>
    <div id="branding">🎮 Provided by Gullsher Games</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        canvas.width = 800;
        canvas.height = 400;

        let score = 0;
        let gameState = "playing";

        const bike = {
            x: 100, y: 300, vx: 0, vy: 0, angle: 0, va: 0,
            width: 40, height: 20, grounded: false
        };

        const terrain = [];
        for (let i = 0; i < 100; i++) {
            terrain.push({ x: i * 100, y: 350 + Math.sin(i * 0.5) * 30 });
        }

        function getTerrainY(x) {
            const index = Math.floor(x / 100);
            if (index < 0) return 350;
            if (index >= terrain.length - 1) return 350;
            const t1 = terrain[index];
            const t2 = terrain[index + 1];
            const ratio = (x % 100) / 100;
            return t1.y + (t2.y - t1.y) * ratio;
        }

        function update() {
            if (gameState !== "playing") return;

            bike.vy += 0.2; // Gravity
            bike.x += bike.vx;
            bike.y += bike.vy;
            bike.angle += bike.va;

            const groundY = getTerrainY(bike.x);
            if (bike.y > groundY - 20) {
                bike.y = groundY - 20;
                bike.vy = 0;
                bike.grounded = true;
                // Friction
                bike.vx *= 0.98;
                // Align to slope
                const nextY = getTerrainY(bike.x + 5);
                const slope = Math.atan2(nextY - groundY, 5);
                bike.angle = bike.angle * 0.8 + slope * 0.2;
            } else {
                bike.grounded = false;
                bike.va *= 0.95; // Air resistance for rotation
            }

            // Controls
            if (keys["KeyW"] || keys["ArrowUp"]) {
                if (bike.grounded) bike.vx += 0.2;
            }
            if (keys["KeyS"] || keys["ArrowDown"]) {
                bike.vx *= 0.95;
            }
            if (keys["KeyA"] || keys["ArrowLeft"]) {
                bike.va -= 0.005;
            }
            if (keys["KeyD"] || keys["ArrowRight"]) {
                bike.va += 0.005;
            }

            // Crash condition (too much angle)
            if (Math.abs(bike.angle) > Math.PI * 0.4 && bike.grounded) {
                // gameState = "crashed";
                // alert("Crashed! Press R to restart.");
            }

            score = Math.max(score, Math.floor(bike.x / 10));
            scoreElement.innerText = score;

            if (keys["KeyR"]) resetGame();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Terrain
            ctx.save();
            ctx.translate(-bike.x + 100, 0);
            ctx.beginPath();
            ctx.moveTo(terrain[0].x, 400);
            terrain.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.lineTo(terrain[terrain.length-1].x, 400);
            ctx.fillStyle = "#8B4513";
            ctx.fill();
            ctx.strokeStyle = "#5D2E0C";
            ctx.lineWidth = 5;
            ctx.stroke();

            // Draw Bike
            ctx.save();
            ctx.translate(bike.x, bike.y);
            ctx.rotate(bike.angle);
            
            // Bike Body
            ctx.fillStyle = "#f44336";
            ctx.fillRect(-20, -10, 40, 10);
            // Wheels
            ctx.fillStyle = "#000";
            ctx.beginPath(); ctx.arc(-15, 5, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(15, 5, 8, 0, Math.PI*2); ctx.fill();
            // Rider
            ctx.fillStyle = "#2196f3";
            ctx.fillRect(-5, -25, 10, 15);
            ctx.beginPath(); ctx.arc(0, -30, 6, 0, Math.PI*2); ctx.fill();
            
            ctx.restore();
            ctx.restore();
        }

        const keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function resetGame() {
            bike.x = 100; bike.y = 300; bike.vx = 0; bike.vy = 0; bike.angle = 0; bike.va = 0;
            score = 0; gameState = "playing";
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
