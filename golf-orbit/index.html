<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Orbit - Gullsher Games</title>
    <style>
        body { margin: 0; background: #87CEEB; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%); border: 4px solid #2ecc71; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.2); max-width: 95vw; max-height: 85vh; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: #2ecc71; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); pointer-events: none; }
        #branding { position: absolute; bottom: 15px; right: 15px; font-size: 12px; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; pointer-events: none; }
        #power-meter { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 200px; height: 20px; background: #eee; border: 2px solid #333; border-radius: 10px; overflow: hidden; }
        #power-fill { width: 0%; height: 100%; background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c); transition: width 0.05s; }
    </style>
</head>
<body>
    <div id="ui">Distance: <span id="dist">0</span>m | Best: <span id="best">0</span>m</div>
    <div id="power-meter"><div id="power-fill"></div></div>
    <canvas id="gameCanvas"></canvas>
    <div id="branding">🎮 Provided by Gullsher Games</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const distElement = document.getElementById("dist");
        const bestElement = document.getElementById("best");
        const powerFill = document.getElementById("power-fill");

        canvas.width = 800;
        canvas.height = 400;

        let distance = 0;
        let best = 0;
        let power = 0;
        let powerDir = 1;
        let gameState = "aiming"; // aiming, flying, landed
        
        const ball = { x: 100, y: 340, vx: 0, vy: 0, radius: 6 };
        const gravity = 0.15;

        function update() {
            if (gameState === "aiming") {
                power += 2 * powerDir;
                if (power >= 100 || power <= 0) powerDir *= -1;
                powerFill.style.parentElement.style.display = "block";
                powerFill.style.width = power + "%";
            } else if (gameState === "flying") {
                powerFill.style.parentElement.style.display = "none";
                ball.vy += gravity;
                ball.x += ball.vx;
                ball.y += ball.vy;

                if (ball.y > 340) {
                    ball.y = 340;
                    ball.vy *= -0.4; // Bounce
                    ball.vx *= 0.8;  // Friction
                    if (Math.abs(ball.vx) < 0.2) {
                        gameState = "landed";
                        if (distance > best) {
                            best = distance;
                            bestElement.innerText = best;
                        }
                        setTimeout(resetGame, 2000);
                    }
                }
                distance = Math.max(distance, Math.floor((ball.x - 100) / 5));
                distElement.innerText = distance;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Ground
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(0, 350, canvas.width, 50);

            // Draw Flag
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(100, 350); ctx.lineTo(100, 300); ctx.stroke();
            ctx.fillStyle = "#e74c3c";
            ctx.beginPath(); ctx.moveTo(100, 300); ctx.lineTo(120, 310); ctx.lineTo(100, 320); ctx.fill();

            // Draw Ball
            ctx.save();
            // Camera follow
            if (gameState === "flying" && ball.x > 400) {
                ctx.translate(-(ball.x - 400), 0);
                // Draw infinite ground
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(ball.x - 400, 350, canvas.width, 50);
            }
            
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.strokeStyle = "#ccc";
            ctx.stroke();
            ctx.restore();

            if (gameState === "landed") {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.fillText(`GREAT SHOT: ${distance}m`, canvas.width/2, canvas.height/2);
            }
        }

        function shoot() {
            if (gameState === "aiming") {
                gameState = "flying";
                ball.vx = (power / 10) + 5;
                ball.vy = -(power / 10) - 5;
            }
        }

        canvas.addEventListener("mousedown", shoot);
        window.addEventListener("keydown", (e) => { if (e.code === "Space") shoot(); });

        function resetGame() {
            gameState = "aiming";
            ball.x = 100;
            ball.y = 340;
            ball.vx = 0;
            ball.vy = 0;
            distance = 0;
            distElement.innerText = "0";
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
